[build]
  command = "npm --prefix Athar/beta ci && npm --prefix athar-react ci && npm --prefix athar-react run build"
  publish = "athar-react/dist"

[functions]
  directory = "Athar/beta/netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20.19.0"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
